name: PHPUnit
on: [push, pull_request]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
    name: Hub quality (PHP ${{ matrix.php }})
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with: {php-version: '${{ matrix.php }}', coverage: none, tools: composer}
      - run: composer validate --strict
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: composer lint
      - run: composer phpstan
      - run: composer test
      - uses: actions/setup-node@v6
        if: matrix.php == '8.3'
        with: {node-version: '20', cache: npm}
      - if: matrix.php == '8.3'
        run: npm ci --ignore-scripts
      - if: matrix.php == '8.3'
        run: npm run test:version
      - if: matrix.php == '8.3'
        run: npm run audit:repository
      - if: matrix.php == '8.3'
        run: composer install --working-dir=examples/sample-plugin --no-interaction --prefer-dist --no-progress
      - if: matrix.php == '8.3'
        run: composer validate --working-dir=examples/sample-plugin --strict
      - if: matrix.php == '8.3'
        run: php scripts/test-client-example-autoload.php
      - if: matrix.php == '8.3'
        run: npm run build:release
  client-sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
    name: Client SDK quality (PHP ${{ matrix.php }})
    defaults:
      run:
        working-directory: packages/client-sdk
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with: {php-version: '${{ matrix.php }}', coverage: none, tools: composer}
      - run: composer validate --strict
      - if: matrix.php == '8.1'
        run: composer update --no-interaction --prefer-dist --no-progress
      - if: matrix.php != '8.1'
        run: composer install --no-interaction --prefer-dist --no-progress
      - run: composer quality
