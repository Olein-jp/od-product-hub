name: PHPStan
on: [push, pull_request]
jobs:
  phpstan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with: {php-version: '8.3', tools: composer}
      - run: composer install --no-interaction --prefer-dist
      - run: composer phpstan
